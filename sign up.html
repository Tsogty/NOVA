<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA - Sign Up</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('https://i.pinimg.com/736x/34/5f/73/345f73ce3ee2b07426cba80c4c8c306b.jpg') no-repeat center center/cover;
position:relative;
color:#e0e7ff;
}

/* 🌌 overlay */
body::before{
content:"";
position:fixed;
inset:0;
backdrop-filter:blur(10px);
background:rgba(20,20,60,0.55);
z-index:-1;
}

/* Back link */

.back{
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
color:#c7d2fe;
font-size:15px;
}

.back a{
color:#c7d2fe;
text-decoration:none;
}

/* 🧊 Glass Card */

.card{
width:420px;
background:rgba(30,30,70,0.65);
padding:40px;
border-radius:22px;
text-align:center;
backdrop-filter:blur(14px);
box-shadow:0 20px 50px rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.1);
}

/* 🔥 LOGO */

.logo{
width:80px;
height:80px;
margin:auto;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#60a5fa,#8b5cf6,#fb7185);
box-shadow:
0 0 25px rgba(99,102,241,0.4),
0 0 40px rgba(251,113,133,0.25);
margin-bottom:20px;
}

.logo img{
width:45px;
height:45px;

}

/* Title */

h1{
font-size:26px;
margin-bottom:5px;
}

.subtitle{
color:#c7d2fe;
margin-bottom:30px;
}

/* Form */

form{
text-align:left;
}

label{
font-size:14px;
font-weight:500;
}

input, select{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,0.1);
border-radius:12px;
font-size:14px;
background:rgba(255,255,255,0.05);
color:#e0e7ff;
outline:none;
transition:0.3s;
}

/* Focus glow */
input:focus, select:focus{
border-color:#6366f1;
box-shadow:0 0 10px rgba(99,102,241,0.4);
}

/* Dropdown text fix */
select{
color:#c7d2fe;
}

/* 🔥 Button */

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:16px;
color:white;
background:linear-gradient(90deg,#60a5fa,#8b5cf6,#fb7185);
cursor:pointer;
margin-top:10px;
box-shadow:
0 10px 30px rgba(0,0,0,0.3),
0 0 20px rgba(251,113,133,0.2);
transition:0.3s;
}

button:hover{
transform:translateY(-2px) scale(1.02);
}

/* Footer */

.footer{
margin-top:20px;
font-size:14px;
color:#c7d2fe;
text-align:center;
}

.footer a{
color:#93c5fd;
text-decoration:none;
}

</style>
</head>

<body>

<div class="back"><a href="home.html">← Back to Home</a></div>

<div class="card">

<!-- ✅ LOGO -->
<div class="logo">
 <img src="C:\Users\PC-02\Downloads\star.png" alt="sigma.jpg" class="w-30 h-16">
</div>

<h1>Get started</h1>
<div class="subtitle">Create your account to begin learning</div>

<form>

<label>Full Name</label>
<input type="text" placeholder="John Doe">

<label>Email</label>
<input type="email" placeholder="your@email.com">

<label>Grade Level</label>
<select>
<option>Select your grade</option>
<option>Grade 1</option>
<option>Grade 2</option>
<option>Grade 3</option>
<option>Grade 4</option>
<option>Grade 5</option>
<option>Grade 6</option>
<option>Grade 7</option>
<option>Grade 8</option>
<option>Grade 9</option>
<option>Grade 10</option>
<option>Grade 11</option>
<option>Grade 12</option>
</select>

<label>Password</label>
<input type="password" placeholder="••••••••">

<button type="submit">
  <a href="home.html" style="color:white;text-decoration:none;">Create Account</a>
</button>

</form>

<div class="footer">
Already have an account? <a href="Login.html">Sign In</a>
</div>

</div>

</body>
</html>
